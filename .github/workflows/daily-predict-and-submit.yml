name: Daily question prediction

on:
  schedule:
    # 08:00 Beijing time (UTC+8) = 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  predict-and-submit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run prediction
        env:
          PLATFORM_BASE_URL: ${{ secrets.PLATFORM_BASE_URL }}   # 新增
          PLATFORM_TOKEN: ${{ secrets.PLATFORM_TOKEN }}
          SUBMIT_TOKEN: ${{ secrets.SUBMIT_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
        run: |
          python scripts/predict_questions.py \
            --config config/agent_quickstart.yaml \
            --once \
            --days-back 7
