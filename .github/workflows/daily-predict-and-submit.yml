name: Daily question prediction

on:
  schedule:
    # 08:00 Beijing time (UTC+8) = 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  predict-and-submit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run previous-day prediction and submit
        env:
          PLATFORM_BASE_URL: ${{ secrets.PLATFORM_BASE_URL }}
          PLATFORM_TOKEN: ${{ secrets.PLATFORM_TOKEN }}
          SUBMIT_TOKEN: ${{ secrets.SUBMIT_TOKEN }}
        run: |
          python scripts/predict_questions.py \
            --config config/agent_quickstart.yaml \
            --once \
            --exact-previous-day
